name: Monthly Deep Report

on:
  schedule:
    # First Saturday of each month at 09:00 UTC
    # GitHub Actions doesn't support "first Saturday" directly, so we run
    # on days 1-7 on Saturdays. The script itself doesn't filter, so it
    # will fire every Saturday in the first week of the month.
    - cron: '0 9 1-7 * 6'
  workflow_dispatch:

jobs:
  monthly-report:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run monthly report
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: python scripts/run_monthly.py
